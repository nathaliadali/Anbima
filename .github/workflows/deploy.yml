name: Build e Deploy no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite rodar manualmente

# Permissões para o GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Python: gerar os JSONs de dados ----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências Python
        run: pip install pandas openpyxl requests beautifulsoup4

      - name: Rodar pipeline de dados
        run: |
          cd ${{ github.workspace }}
          python scripts/build_data.py --raw data/raw --output public/data

      # ---- Node: build do React ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências Node
        run: npm install

      - name: Build
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ---- Deploy no GitHub Pages ----
      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
